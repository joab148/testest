<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이러닝 운영 관리사 모의고사</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Noto Sans KR -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f9ff; }
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .radio-label input:checked + div { border-color: #3b82f6; background-color: #eff6ff; }
  </style>
</head>
<body class="text-gray-800 antialiased min-h-screen pb-12">

  <!-- 네비게이션 헤더 -->
  <header class="bg-blue-600 shadow-md py-4 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 flex items-center justify-between">
      <h1 class="text-white text-xl font-bold tracking-tight">이러닝 운영 관리사 자격시험 대비</h1>
      <span class="text-blue-100 text-sm font-medium">랜덤 모의고사 20문항</span>
    </div>
  </header>

  <!-- 메인 컨테이너 -->
  <main class="max-w-4xl mx-auto px-4 mt-8">
    <div id="loading" class="text-center py-20">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mb-4"></div>
      <p class="text-blue-800 font-medium text-lg">서버에서 문제 데이터를 불러오는 중입니다...</p>
      <p class="text-blue-500 text-sm mt-2">구글 시트 연동 대기중</p>
    </div>

    <!-- 퀴즈 폼 컨테이너 -->
    <div id="quiz-container" class="hidden space-y-6"></div>

    <!-- 제출 버튼 -->
    <div id="submit-section" class="hidden mt-10 text-center">
      <button onclick="submitQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-12 rounded-full shadow-lg transition duration-200 transform hover:scale-105">
        답안 제출 및 결과 확인하기
      </button>
    </div>

    <!-- 결과 표시 영역 -->
    <div id="result-summary" class="hidden mt-8 bg-white p-8 rounded-2xl shadow-xl text-center border-t-8 border-blue-500 fade-in">
      <h2 class="text-3xl font-bold text-gray-800 mb-2">테스트 결과</h2>
      <p class="text-gray-500 mb-6">총 20문제 중 맞힌 개수와 점수를 확인하세요.</p>
      <div class="text-5xl font-black text-blue-600 mb-4"><span id="score-text">0</span>점</div>
      <p class="text-lg font-medium text-gray-700">맞힌 문항: <span id="correct-count" class="text-blue-600">0</span> / 20</p>
      <button onclick="location.reload()" class="mt-8 bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-8 rounded-lg shadow transition">
        새로운 랜덤 문제로 다시 풀기
      </button>
    </div>
  </main>

  <script>
    // ============================================================================
    // [캔버스 프리뷰 및 독립 실행을 위한 Mock API]
    // 구글 앱스 스크립트 환경이 아닐 경우 정상 작동을 위해 가짜 데이터를 제공합니다.
    // ============================================================================
    if (typeof google === 'undefined') {
      window.google = {
        script: {
          run: {
            withSuccessHandler: function(callback) { this.callback = callback; return this; },
            withFailureHandler: function(errback) { this.errback = errback; return this; },
            getQuizData: function() {
              setTimeout(() => {
                const mockQuestions = [
                  { id: 1, question: "이러닝의 주요 특징으로 가장 거리가 먼 것은?", options: ["시공간의 제약 극복", "학습자 주도적 학습", "단방향 정보 전달 중심", "다양한 멀티미디어 활용"], answer: 2, feedback: "정답은 3번입니다. 이러닝은 교수자와 학습자, 그리고 학습자 간의 상호작용을 중요하게 생각합니다. 따라서 단방향 정보 전달 중심이라는 설명은 이러닝의 특징과 거리가 멉니다." },
                  { id: 2, question: "ADDIE 교수설계 모형의 순서로 알맞은 것은?", options: ["분석-설계-개발-실행-평가", "분석-개발-설계-평가-실행", "설계-분석-개발-실행-평가", "평가-분석-설계-개발-실행"], answer: 0, feedback: "정답은 1번입니다. ADDIE 모형은 체제적 교수설계의 가장 기본이 되는 모형입니다. 분석, 설계, 개발, 실행, 평가의 순서로 진행됩니다." },
                  { id: 3, question: "다양한 학습관리시스템(LMS) 간에 콘텐츠를 공유하고 재사용하기 위해 제정된 표준 규격은?", options: ["HTML5", "SCORM", "HTTP", "XML"], answer: 1, feedback: "정답은 2번입니다. SCORM은 다양한 시스템 간의 호환성과 콘텐츠의 재사용성을 높이기 위한 국제 표준입니다. 이를 통해 A회사의 LMS에서 만든 콘텐츠를 B회사의 LMS에서도 원활하게 구동할 수 있습니다." },
                  { id: 4, question: "학습관리시스템(LMS)의 주요 기능에 해당하지 않는 것은?", options: ["학습자 진도 관리", "온라인 평가 및 성적 관리", "학습 콘텐츠 직접 저작 및 편집", "학습자와 교수자 간 상호작용 지원"], answer: 2, feedback: "정답은 3번입니다. LMS는 학습의 전반적인 과정을 관리하고 지원하는 시스템입니다. 콘텐츠를 직접 저작하고 편집하는 기능은 주로 저작도구(Authoring Tool)나 LCMS의 고유 역할입니다." },
                  { id: 5, question: "다음 중 형성평가(Formative Evaluation)의 목적에 대한 설명으로 가장 적절한 것은?", options: ["학습 전 학습자의 선수지식 파악", "학습 진행 중 학습자의 이해도 점검 및 피드백 제공", "학습 종료 후 최종 학업 성취도 등급 부여", "학습 프로그램의 전체적인 투자 대비 효과 분석"], answer: 1, feedback: "정답은 2번입니다. 형성평가는 학습이 진행되는 도중에 학습자의 이해를 돕고 교수 전략을 수정하기 위해 실시합니다. 학습 전에는 진단평가를, 학습 후에는 총괄평가를 실시하는 것이 일반적입니다." },
                  { id: 6, question: "오프라인 학습 전 온라인으로 미리 선행학습을 진행하는 형태는?", options: ["마이크로러닝", "액션러닝", "플립러닝 (Flipped Learning)", "어댑티브 러닝"], answer: 2, feedback: "정답은 3번입니다. 플립러닝은 전통적인 수업 방식을 뒤집어 교실 밖에서 개념을 익히고 교실 안에서 심화 학습을 하는 방식입니다. 이를 통해 교실에서의 상호작용과 학습 효과를 극대화할 수 있습니다." },
                  { id: 7, question: "켈러(Keller)의 ARCS 모형의 구성 요소가 아닌 것은?", options: ["주의집중(Attention)", "관련성(Relevance)", "자신감(Confidence)", "성실성(Sincerity)"], answer: 3, feedback: "정답은 4번입니다. ARCS 모형은 주의집중(A), 관련성(R), 자신감(C), 만족감(S)으로 구성됩니다. 학습자의 동기를 유발하고 유지하기 위한 구체적인 전략을 제공하는 모형입니다." },
                  { id: 8, question: "웹 접근성(Web Accessibility)에 대한 설명으로 올바른 것은?", options: ["로딩 속도를 최적화하는 기술", "장애인이나 고령자 등 누구나 동등하게 웹을 이용할 수 있도록 보장하는 것", "동일한 디자인을 보여주는 것", "해킹으로부터 웹을 보호하는 기술"], answer: 1, feedback: "정답은 2번입니다. 웹 접근성은 시각, 청각, 신체적 제약이 있는 사용자도 동등하게 웹을 이용할 수 있게 하는 환경입니다. 이러닝 콘텐츠 개발 시 스크린 리더 지원 등을 통해 이를 준수해야 합니다." },
                  { id: 9, question: "스토리보드(Storyboard) 작성 시 유의사항으로 적절하지 않은 것은?", options: ["모든 텍스트, 이미지를 구체적으로 명시한다.", "개발자가 이해하기 쉽도록 명확하게 작성한다.", "내레이션 대본은 즉흥적으로 정하므로 생략한다.", "상호작용 작동 방식을 포함한다."], answer: 2, feedback: "정답은 3번입니다. 스토리보드는 영상과 음성을 포함한 콘텐츠 개발의 명확한 설계도 역할을 합니다. 따라서 내레이션 대본 역시 개발 전 단계에서 텍스트로 철저히 작성되어야 합니다." },
                  { id: 10, question: "저작권법상 '공정이용'에 해당할 가능성이 가장 높은 경우는?", options: ["영리 목적으로 타인 강좌 판매", "학교 수업 목적으로 타인 저작물 일부 인용", "타인 음악으로 유튜브 수익 창출", "베스트셀러 전체 복사 배포"], answer: 1, feedback: "정답은 2번입니다. 비영리적인 교육 목적이거나 정당한 범위 내에서의 출처를 명시한 인용은 공정이용으로 인정받을 수 있습니다. 그러나 전체를 무단 복제하거나 영리적 목적이 포함되면 저작권 침해입니다." },
                  { id: 11, question: "설계(Design) 단계에서 주로 수행하는 업무는?", options: ["요구분석 및 학습자 분석", "교수전략 수립 및 스토리보드 작성", "프로토타입 개발 및 알파테스트", "LMS 탑재 및 학습자 수강 등록"], answer: 1, feedback: "정답은 2번입니다. 설계 단계에서는 분석 결과를 바탕으로 구체적인 교수 전략을 세우고 스토리보드를 작성합니다. 요구분석은 '분석' 단계, 프로토타입은 '개발' 단계의 업무입니다." },
                  { id: 12, question: "짧은 시간 동안 학습할 수 있도록 핵심 내용만 압축한 형태는?", options: ["매크로 러닝", "마이크로 러닝", "블렌디드 러닝", "오프라인 러닝"], answer: 1, feedback: "정답은 2번입니다. 마이크로 러닝은 바쁜 현대인들이 자투리 시간에 학습할 수 있도록 고안된 짧은 단위의 방식입니다. 한 가지의 명확한 학습 목표를 가진 간결한 콘텐츠가 특징입니다." },
                  { id: 13, question: "게시판에서 학습자들끼리 토론을 하는 활동의 상호작용 유형은?", options: ["학습자-학습자 상호작용", "학습자-교수자 상호작용", "학습자-콘텐츠 상호작용", "학습자-시스템 상호작용"], answer: 0, feedback: "정답은 1번입니다. 학습자들 간의 협력 학습이나 의견 교환은 학습자-학습자 상호작용을 나타냅니다. 이러한 상호작용은 소속감을 주고 학습 동기를 부여하여 성공적인 이러닝을 이끕니다." },
                  { id: 14, question: "비동기식 이러닝의 특징이 아닌 것은?", options: ["원하는 시간에 학습 가능", "실시간 화상 강의를 통한 즉각적 질의응답", "게시판을 통한 상호작용", "자신의 속도에 맞춘 반복 학습"], answer: 1, feedback: "정답은 2번입니다. 실시간 화상 강의와 즉각적인 피드백은 동시간대에 진행되는 동기식 이러닝의 특징입니다. 비동기식은 학습자와 교수자가 서로 다른 시간에 시스템에 접속하여 학습하는 방식입니다." },
                  { id: 15, question: "콘텐츠 객체를 저장, 관리, 조합하여 새로운 과정을 구성하도록 지원하는 시스템은?", options: ["ERP", "CRM", "LCMS", "HRD"], answer: 2, feedback: "정답은 3번입니다. LCMS(Learning Content Management System)는 학습 객체들을 데이터베이스화하여 효율적으로 저장하고 관리합니다. 이를 통해 필요한 콘텐츠를 쉽게 검색하고 재조합할 수 있습니다." },
                  { id: 16, question: "이러닝 튜터(Tutor)의 역할로 가장 거리가 먼 것은?", options: ["진도 독려 및 동기 부여", "질문 답변 및 피드백", "LMS 코드 수정 및 서버 복구", "온라인 토론 촉진"], answer: 2, feedback: "정답은 3번입니다. 서버 복구나 시스템 유지보수는 시스템 관리자나 엔지니어의 역할입니다. 튜터는 주로 학습 촉진자로서 운영, 내용 전문가, 상담자의 역할을 수행합니다." },
                  { id: 17, question: "학습자 분석 시 고려해야 할 사항으로 적절하지 않은 것은?", options: ["학습자의 연령대", "사전 지식 수준", "컴퓨터 활용 능력", "강사의 취미"], answer: 3, feedback: "정답은 4번입니다. 학습자 분석은 교육 대상자의 특성을 파악하여 가장 적합한 교수 전략을 세우기 위해 진행합니다. 따라서 교육을 진행하는 강사의 개인적 정보는 분석 대상이 아닙니다." },
                  { id: 18, question: "딕과 캐리의 교수체제설계 모형에서 가장 마지막에 수행되는 단계는?", options: ["교수목표 설정", "교수자료 개발", "형성평가", "총괄평가"], answer: 3, feedback: "정답은 4번입니다. 딕과 캐리 모형은 교수목표 설정으로 시작하여 총괄평가 설계 및 실시로 마무리되는 모형입니다. 형성평가를 통해 피드백을 반영한 후 최종적으로 총괄평가를 실시합니다." },
                  { id: 19, question: "콘텐츠 특성을 기술하여 검색을 용이하게 하는 데이터에 대한 데이터는?", options: ["프로토콜", "메타데이터", "알고리즘", "바이트코드"], answer: 1, feedback: "정답은 2번입니다. 메타데이터는 방대한 학습 자원 속에서 원하는 콘텐츠를 빠르고 정확하게 찾기 위해 부여하는 꼬리표 같은 정보입니다. SCORM 등에서도 이 규격을 중요하게 다룹니다." },
                  { id: 20, question: "요구분석에서 '요구(Needs)'의 개념을 가장 잘 설명한 것은?", options: ["학습자가 원하는 것", "현재 상태와 바람직한 상태 간의 격차", "최신 교육 트렌드", "교육 예산"], answer: 1, feedback: "정답은 2번입니다. 교육 공학에서 요구(Needs)란 현재의 실측된 성과와 기대하는 목표 상태 사이의 격차를 의미합니다. 이 격차를 해소하기 위해 어떤 교육이 필요한지 분석하는 것이 요구분석입니다." }
                ];
                // 섞어서 반환
                this.callback(mockQuestions.sort(() => Math.random() - 0.5));
              }, 800);
            },
            saveResults: function(score, answers) {
              setTimeout(() => {
                this.callback({success: true});
              }, 500);
            }
          }
        }
      };
    }

    // ============================================================================
    // 프론트엔드 로직
    // ============================================================================
    let globalQuestions = [];

    window.onload = function() {
      // 구글 앱스 스크립트의 getQuizData 함수를 호출합니다.
      google.script.run
        .withSuccessHandler(renderQuiz)
        .withFailureHandler(function(err) {
          document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">오류가 발생했습니다: ${err.message}</p>`;
        })
        .getQuizData();
    };

    // 문제 렌더링 함수
    function renderQuiz(questions) {
      globalQuestions = questions;
      const container = document.getElementById('quiz-container');
      const loading = document.getElementById('loading');
      const submitSection = document.getElementById('submit-section');

      loading.style.display = 'none';
      
      let html = '';
      questions.forEach((q, index) => {
        html += `
          <div class="bg-white rounded-2xl shadow-sm border border-blue-100 p-6 md:p-8 fade-in" id="question-card-${index}">
            <div class="flex items-start mb-4">
              <div class="flex-shrink-0 bg-blue-100 text-blue-700 font-bold w-10 h-10 rounded-full flex items-center justify-center mr-4 text-lg">
                ${index + 1}
              </div>
              <h3 class="text-lg font-bold text-gray-800 pt-1 leading-relaxed">${q.question}</h3>
            </div>
            
            <div class="space-y-3 mt-6 ml-0 md:ml-14">
        `;
        
        q.options.forEach((opt, optIndex) => {
          html += `
            <label class="radio-label block cursor-pointer group">
              <input type="radio" name="q${index}" value="${optIndex}" class="hidden">
              <div class="border border-gray-200 rounded-xl p-4 transition-colors duration-200 flex items-center hover:bg-sky-50">
                <span class="w-6 h-6 rounded-full border-2 border-gray-300 flex-shrink-0 mr-3 flex items-center justify-center group-hover:border-blue-400 input-indicator">
                  <span class="w-3 h-3 bg-blue-500 rounded-full opacity-0 transform scale-0 transition-all duration-200 inner-dot"></span>
                </span>
                <span class="text-gray-700 group-hover:text-blue-900 font-medium">${opt}</span>
              </div>
            </label>
          `;
        });

        html += `
            </div>
            <!-- 피드백 영역 (기본은 숨김) -->
            <div id="feedback-${index}" class="hidden mt-6 ml-0 md:ml-14 p-5 rounded-xl border">
              <div class="font-bold mb-2 flex items-center text-lg" id="feedback-title-${index}"></div>
              <p class="text-gray-700 leading-relaxed" id="feedback-text-${index}"></p>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      container.classList.remove('hidden');
      submitSection.classList.remove('hidden');

      // 라디오 버튼 커스텀 UI 이벤트 리스너 (선택 시 파란 점 애니메이션)
      document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', function() {
          const name = this.name;
          document.querySelectorAll(`input[name="${name}"]`).forEach(sibling => {
            const indicator = sibling.nextElementSibling.querySelector('.inner-dot');
            indicator.classList.remove('opacity-100', 'scale-100');
            indicator.parentElement.classList.remove('border-blue-500');
          });
          const activeIndicator = this.nextElementSibling.querySelector('.inner-dot');
          activeIndicator.classList.add('opacity-100', 'scale-100');
          activeIndicator.parentElement.classList.add('border-blue-500');
        });
      });
    }

    // 채점 및 피드백 표시 함수
    function submitQuiz() {
      // 미입력 확인
      let allAnswered = true;
      let answersToSave = {};
      
      globalQuestions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (!selected) allAnswered = false;
        answersToSave[`q${index}`] = selected ? parseInt(selected.value) : null;
      });

      if (!allAnswered) {
        alert("아직 풀지 않은 문제가 있습니다. 모든 문제에 답해주세요.");
        return;
      }

      // 채점 로직
      let correctCount = 0;
      globalQuestions.forEach((q, index) => {
        const selectedValue = parseInt(document.querySelector(`input[name="q${index}"]:checked`).value);
        const isCorrect = (selectedValue === q.answer);
        
        if (isCorrect) correctCount++;

        // 문항별 피드백 UI 업데이트
        const fbContainer = document.getElementById(`feedback-${index}`);
        const fbTitle = document.getElementById(`feedback-title-${index}`);
        const fbText = document.getElementById(`feedback-text-${index}`);
        const card = document.getElementById(`question-card-${index}`);
        
        fbContainer.classList.remove('hidden');
        
        if (isCorrect) {
          fbContainer.classList.add('bg-blue-50', 'border-blue-200');
          fbTitle.classList.add('text-blue-700');
          fbTitle.innerHTML = `<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 정답입니다!`;
          card.classList.add('border-blue-300', 'ring-2', 'ring-blue-100');
        } else {
          fbContainer.classList.add('bg-red-50', 'border-red-200');
          fbTitle.classList.add('text-red-600');
          fbTitle.innerHTML = `<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 오답입니다. (내가 고른 답: ${selectedValue + 1}번)`;
          card.classList.add('border-red-300');
        }

        fbText.innerText = q.feedback; // 3문장 피드백 출력
        
        // 정답 시각적 표시
        const options = document.querySelectorAll(`input[name="q${index}"]`);
        options.forEach(opt => {
          opt.disabled = true; // 답안 변경 방지
          if (parseInt(opt.value) === q.answer) {
             opt.nextElementSibling.classList.add('bg-blue-100', 'border-blue-400', 'font-bold');
             opt.nextElementSibling.classList.remove('bg-white');
          }
        });
      });

      // 점수 계산 (100점 만점)
      const score = (correctCount / globalQuestions.length) * 100;
      
      // 구글 시트에 결과 저장 호출
      google.script.run
        .withSuccessHandler((res) => console.log(res.message))
        .saveResults(score, answersToSave);

      // 결과 영역 렌더링
      document.getElementById('score-text').innerText = score;
      document.getElementById('correct-count').innerText = correctCount;
      document.getElementById('result-summary').classList.remove('hidden');
      document.getElementById('submit-section').classList.add('hidden');
      
      // 최상단으로 스크롤 이동
      window.scrollTo({ top: document.getElementById('result-summary').offsetTop - 100, behavior: 'smooth' });
    }
  </script>
</body>
</html>
